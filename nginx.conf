# Конфигурация Nginx для CRM Monitor
# Разместить в /etc/nginx/sites-available/ai.ecom-upload.space
# или добавить в существующий конфиг домена

server {
    listen 80;
    listen [::]:80;
    server_name ai.ecom-upload.space;
    
    # Редирект на HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ai.ecom-upload.space;

    # SSL сертификаты (настроить согласно вашей конфигурации)
    # ssl_certificate /path/to/certificate.crt;
    # ssl_certificate_key /path/to/private.key;

    # Корневая директория для основного проекта
    root /var/www/ai.ecom-upload.space;
    index index.html index.php;

    # Логи
    access_log /var/log/nginx/ai.ecom-upload.space.access.log;
    error_log /var/log/nginx/ai.ecom-upload.space.error.log;

    # Основной проект на корневом пути
    location / {
        try_files $uri $uri/ /index.html;
    }

    # CRM Monitor в поддиректории /crm-monitor
    # ВАЖНО: После сборки скопируйте содержимое dist/ в эту директорию
    location /crm-monitor {
        alias /var/www/ai.ecom-upload.space/crm-monitor;
        try_files $uri $uri/ /crm-monitor/index.html;
        
        # Кэширование статических файлов
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        # Отключить кэширование для HTML
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }
    }

    # PHP для phpMyAdmin (если нужно)
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock; # Изменить версию PHP при необходимости
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # phpMyAdmin (если установлен отдельно)
    location /phpmyadmin {
        alias /usr/share/phpmyadmin;
        index index.php;
        
        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
        }
    }

    # Безопасность
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;
}
