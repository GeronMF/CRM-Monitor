# Фрагмент конфигурации Nginx для добавления в существующий server блок
# Скопируйте этот блок в ваш существующий конфиг для ai.ecom-upload.space
# Или передайте администратору сервера

# CRM Monitor в поддиректории /crm-monitor
location /crm-monitor {
    alias /var/www/ai.ecom-upload.space/crm-monitor;
    try_files $uri $uri/ /crm-monitor/index.html;
    
    # Кэширование статических файлов
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Отключить кэширование для HTML
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
}
